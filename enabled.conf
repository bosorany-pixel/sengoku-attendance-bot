# HTTP: оставляем только под редирект на HTTPS
server {
    if ($host = ya.sergeiscv.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name ya.sergeiscv.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/ya.sergeiscv.ru/html;
        allow all;
    }

    return 301 https://$host$request_uri;


}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ya.sergeiscv.ru;

    # сертификаты (certbot обновляет их автоматически)
    ssl_certificate /etc/letsencrypt/live/ya.sergeiscv.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ya.sergeiscv.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # статический корень (на случай, если что-то отдаёшь с файловой системы)
    root /var/www/ya.sergeiscv.ru/html;
    index index.html;

    # --- прокси /n4u на локальный сервис на 8000 ---
    # ВАРИАНТ А (обычно правильный): /n4u/foo -> http://127.0.0.1:8000/foo
    location /n4u/ {
        proxy_pass http://127.0.0.1:8010/;  # обратил внимание на завершающий слэш — он отрежет префикс /n4u
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }
    location /fserver/ {
        proxy_pass http://127.0.0.1:5000/;
    }
    location /sengoku/ {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /sengoku;
        proxy_set_header X-Forwarded-Prefix /fserver;
        proxy_pass http://127.0.0.1:5001/;
    }
    # Main installation (no welcome page): frontend 8101, api 8100
    # Frontend built with base: /mordor/, VITE_API_URL=/mordor/api
    location /mordor/api/ {
        proxy_pass http://127.0.0.1:8100/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /mordor/ {
        proxy_pass http://127.0.0.1:8101/mordor/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Erebor installation (welcome page, own DB/Discord): frontend 8112, api 8110
    # Frontend built with base: /erebor/, VITE_API_URL=/erebor/api
    location /erebor/api/ {
        proxy_pass http://127.0.0.1:8110/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /erebor/ {
        proxy_pass http://127.0.0.1:8112/erebor/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # если твой app на 8000 ожидает путь С ПРЕФИКСОМ /n4u,
    # то замени блок выше на это:
    # location /n4u/ {
    #     proxy_pass http://127.0.0.1:8000; # без завершающего слэша — префикс сохранится
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # остальное — можно отдавать статику или 404
    location / {
        try_files $uri $uri/ =404;
    }

}
