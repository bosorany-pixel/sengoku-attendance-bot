version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: sengoku-api
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/db/sengoku_bot.db
      - API_PORT=8000
      - TECHNICAL_TIMEOUT=${TECHNICAL_TIMEOUT:-0}
    volumes:
      - ./db:/db
      - ./src/archives:/app/archives
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Add nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: sengoku-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
