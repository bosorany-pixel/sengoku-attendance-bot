<!doctype html>

<div class="filter-bar">
  <input id="nickFilter" type="text" placeholder="Поиск по нику…" autocomplete="off" />
  <button id="clearFilter" type="button" title="Сбросить">×</button>
</div>

<table>
  <thead>
    <tr>
      <th>Ник</th>
      <th>нажми на меня</th>
      <th>Количество посещенного контента</th>
      <th>Серебра (на счету гильдии)</th>
    </tr>
  </thead>
  <tbody>

    <!-- Dynamic user rows -->
    {% for row in rows %}
      <tr style="color: {{ color if color else '#e0e0e0' }}">
        <td>{{ row['display_name'] or '—' }}</td>
        <td>
          <a href="{{ url_for('user_detail', uid=row['uid']) }}{% if db_param %}?db={{ db_param }}{% endif %}">
            {{ row['uid'] }}
          </a>
        </td>
        <td>{{ row['event_count'] }}</td>
        <td>
          <a href="{{ url_for('payment_detail', uid=row['uid']) }}{% if db_param %}?db={{ db_param }}{% endif %}"></a>
          {{ row['total_amount'] | money }}</td>
      </tr>
    {% endfor %}
  </tbody>
</table>

<style>
    .info-section {
  margin-bottom: 20px;
  text-align: left;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
}

.filter-bar {
  width: 90%;
  max-width: 1000px;
  margin: 0 auto 10px auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

#nickFilter {
  flex: 1;
  background-color: #2a2a2a;
  color: #e0e0e0;
  border: 1px solid #444;
  border-radius: 4px;
  padding: 8px 10px;
}

#nickFilter::placeholder {
  color: #888;
}

#clearFilter {
  background-color: #333;
  color: #e0e0e0;
  border: 1px solid #444;
  border-radius: 4px;
  padding: 8px 12px;
  cursor: pointer;
}

#clearFilter:hover {
  background-color: #3d3d3d;
}

.info-section h2 {
  margin-top: 0;
  font-size: 18px;
}

.info-section p {
  margin: 10px 0;
  line-height: 1.5;
}

.color-legend {
  list-style: none;
  padding: 0;
  margin: 10px 0;
  columns: 2;
  gap: 20px;
}

.color-legend li {
  margin: 4px 0;
}

.rules-link {
  margin-top: 15px;
}

.rules-link a {
  color: #7aa2f7;
  font-size: 16px;
}

@media (max-width: 600px) {
  .color-legend {
    columns: 1;
  }
}
</style>

<script>
  (function() {
    const input = document.getElementById('nickFilter')
    const clearBtn = document.getElementById('clearFilter')
    const table = document.querySelector('table')
    if (!input || !table) return

    const tbody = table.querySelector('tbody')
    function applyFilter() {
      const value = (input.value || '').trim().toLowerCase()
      const rows = tbody.querySelectorAll('tr')
      rows.forEach(function(row) {
        const firstCell = row.querySelector('td')
        if (!firstCell) return
        const nick = (firstCell.textContent || '').toLowerCase()
        const match = value === '' || nick.indexOf(value) !== -1
        row.style.display = match ? '' : 'none'
      })
    }

    input.addEventListener('input', applyFilter)
    clearBtn.addEventListener('click', function() {
      input.value = ''
      input.focus()
      applyFilter()
    })
  })();
</script>
