server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA under /mordor/ (for host reverse proxy)
    location /mordor/ {
        alias /usr/share/nginx/html/mordor/;
        try_files $uri $uri/ /mordor/index.html;
    }

    # API proxy (when frontend container is used standalone, or for host proxy)
    location /mordor/api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: second installation at /erebor/ (welcome page, own API/DB/Discord).
    # Build frontend with VITE_BASE_PATH=/erebor/ and VITE_API_URL=/erebor/api;
    # proxy /erebor/api/ to the Erebor API (different DB_PATH, separate bot token).
    # location /erebor/ {
    #     alias /usr/share/nginx/html/erebor/;
    #     try_files $uri $uri/ /erebor/index.html;
    # }
    # location /erebor/api/ {
    #     proxy_pass http://erebor-api:8000/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Redirect root to app so http://host:8101/ opens the frontend
    location = / {
        return 302 /mordor/;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
